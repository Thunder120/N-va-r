<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NÖVAÎR | Premium Fragrance House</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root { --navy: #020617; --accent: #3b82f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: var(--navy);
            color: #fff;
            font-family: 'Inter', Arial, Helvetica, sans-serif;
            overflow-x: hidden;
        }

        #loader {
            position: fixed; inset: 0; z-index: 10000; background: var(--navy);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; opacity: 0.5; }

        main { position: relative; z-index: 10; width: 100%; pointer-events: none; }
        .interactive { pointer-events: auto !important; }

        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .luxury-text { font-family: 'Playfair Display', Georgia, serif; }

        .product-card { transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; border: 1px solid transparent; }
        .product-card:hover { transform: translateY(-12px); border-color: var(--accent); background: rgba(255,255,255,0.05); }

        .img-box { height: 280px; background: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; padding: 25px; overflow: hidden; position: relative; }
        .img-box img { max-height: 100%; max-width: 100%; object-fit: contain; transition: transform 0.6s ease; }
        .product-card:hover img { transform: scale(1.1); }

        /* WhatsApp button: fixed overlap by allowing wrap + min-height instead of forcing single line */
        .wa-btn {
            display: flex; align-items: center; justify-content: center;
            white-space: normal; line-height: 1.4; word-break: keep-all;
            min-height: 3.2em;
        }

        /* MODAL: full-viewport, scrollable content, sticky visible close button */
        #modal {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(40px);
            display: none; align-items: flex-start; justify-content: center;
            padding: 0; overflow-y: auto;
        }
        #modal.active { display: flex; }

        .modal-card {
            margin: 0 auto; min-height: 100vh;
        }
        @media (min-width: 768px) {
            .modal-card { margin: 40px auto; min-height: auto; }
        }

        .close-btn {
            position: sticky; top: 16px; left: 100%;
            width: 44px; height: 44px; margin-right: 16px; margin-bottom: -44px;
            cursor: pointer; z-index: 1000; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 50%;
            backdrop-filter: blur(10px);
        }
        .close-btn:hover { transform: rotate(90deg); background: rgba(255,255,255,0.2); }
        .close-btn div { position: absolute; width: 18px; height: 2px; background: white; border-radius: 2px; }
        .close-btn div:nth-child(1) { transform: rotate(45deg); }
        .close-btn div:nth-child(2) { transform: rotate(-45deg); }

        .price-old { text-decoration: line-through; color: #64748b; font-size: 0.85rem; }
        .price-new { color: #fff; font-weight: 700; }

        a, button { pointer-events: auto !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="loader">
        <h1 class="text-4xl luxury-text tracking-[0.5em] mb-4">NÖVAÎR</h1>
        <div class="w-32 h-0.5 bg-white/10 overflow-hidden"><div id="load-bar" class="w-0 h-full bg-blue-500"></div></div>
    </div>

    <canvas id="bg-canvas"></canvas>

    <main>
        <nav class="fixed top-0 w-full p-8 md:px-16 flex justify-between items-center z-[100] mix-blend-difference interactive">
            <div class="text-2xl font-light tracking-[0.4em] luxury-text">NÖVAÎR</div>
            <a href="https://www.instagram.com/novairrxx?utm_source=qr" target="_blank" class="hover:text-blue-400 transition-all">
                <svg width="22" height="22" fill="white" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            </a>
        </nav>

        <section class="h-screen flex items-center px-[8%]">
            <div class="max-w-4xl interactive">
                <h1 id="hero-title" class="text-7xl md:text-[10rem] luxury-text opacity-0 leading-none mb-6">NÖVAÎR</h1>
                <p id="hero-sub" class="text-xs uppercase tracking-[0.8em] text-slate-500 opacity-0 mb-10 italic font-light">Ethereal Fragrance Atelier</p>
                <div id="hero-btns" class="opacity-0">
                    <a href="#collection" class="px-12 py-5 bg-white text-black text-[11px] font-bold uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all shadow-2xl">Explore Collection</a>
                </div>
            </div>
        </section>

        <section id="collection" class="py-32 px-[5%] md:px-[10%]">
            <div class="text-center mb-24">
                <h2 class="text-6xl luxury-text italic mb-4">The Collection</h2>
                <div class="w-16 h-0.5 bg-blue-600 mx-auto opacity-50"></div>
            </div>
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10 interactive">
                <!-- Injected by JS -->
            </div>
        </section>

        <section class="py-32 px-[8%]">
            <div class="glass p-16 md:p-24 rounded-[60px] text-center interactive overflow-hidden shadow-2xl">
                <h2 class="text-5xl luxury-text italic mb-8">NÖVAÎR Circle</h2>
                <p class="text-slate-400 mb-12 max-w-xl mx-auto font-light leading-relaxed">Join our inner circle for priority access to rare drops and private fragrance deals.</p>
                <a href="https://chat.whatsapp.com/J7vdDsjSqDZKgSccB98srL" target="_blank" class="wa-btn px-8 py-5 bg-white text-black text-[11px] font-bold uppercase tracking-widest hover:bg-green-600 hover:text-white transition-all rounded-full max-w-xs mx-auto">WhatsApp Community</a>
            </div>
        </section>

        <footer class="py-20 text-center opacity-30 text-[9px] tracking-[1.5em] uppercase font-light">NÖVAÎR LUXE PARFUMERIE • PARIS</footer>
    </main>

    <div id="modal" class="interactive" onclick="if(event.target == this) closeModal()">
        <div class="modal-card glass max-w-6xl w-full rounded-none md:rounded-[40px] overflow-hidden relative shadow-2xl" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="closeModal()">
                <div></div><div></div>
            </div>
            <div class="flex flex-col md:flex-row">
                <div class="w-full md:w-1/2 p-12 bg-white flex items-center justify-center">
                    <img id="m-img" src="" class="max-h-[45vh] md:max-h-[55vh] object-contain drop-shadow-2xl">
                </div>
                <div class="w-full md:w-1/2 p-12 md:p-16 flex flex-col justify-center">
                    <p id="m-brand" class="text-blue-500 text-[11px] font-bold tracking-[0.4em] uppercase mb-4"></p>
                    <h2 id="m-name" class="text-4xl md:text-5xl luxury-text mb-8 leading-tight"></h2>

                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-white/5 p-4 rounded-xl">
                            <span class="text-[9px] text-slate-500 block uppercase mb-1">Status</span>
                            <span class="text-xs text-white font-bold">100% Authentic</span>
                        </div>
                        <div class="bg-white/5 p-4 rounded-xl">
                            <span class="text-[9px] text-slate-500 block uppercase mb-1">Longevity</span>
                            <span id="m-long" class="text-xs text-white font-bold"></span>
                        </div>
                    </div>

                    <div class="mb-12 flex items-baseline gap-4">
                        <span id="m-mrp" class="price-old"></span>
                        <span id="m-price" class="price-new text-4xl tracking-tighter"></span>
                    </div>
                    <a id="m-wa" href="#" target="_blank" class="block w-full py-6 bg-white text-black text-center text-[12px] font-bold uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all rounded-2xl shadow-xl">Secure via WhatsApp</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, brand: "Paco Rabanne", name: "1 Million Elixir", price: "₹4,999", mrp: "₹6,999", img: "https://iili.io/C1I4NWv.jpg", long: "12 Hours" },
            { id: 2, brand: "Valentino", name: "Born in Roma Intense", price: "₹4,699", mrp: "₹6,499", img: "https://iili.io/C1I4wzJ.webp", long: "10 Hours" },
            { id: 3, brand: "Azzaro", name: "The Most Wanted Parfum", price: "₹4,499", mrp: "₹6,299", img: "https://iili.io/C1I4hba.jpg", long: "12+ Hours" },
            { id: 4, brand: "Versace", name: "Eros Eau de Parfum", price: "₹4,299", mrp: "₹5,999", img: "https://iili.io/C1I4W5F.webp", long: "9 Hours" },
            { id: 5, brand: "Kilian Paris", name: "Angels' Share", price: "₹10,999", mrp: "₹15,999", img: "https://iili.io/C1I4kfp.png", long: "12+ Hours" },
            { id: 6, brand: "Parfums de Marly", name: "Layton", price: "₹8,499", mrp: "₹12,499", img: "https://iili.io/C1I4UJt.jpg", long: "10 Hours" },
            { id: 7, brand: "Louis Vuitton", name: "Imagination", price: "₹11,999", mrp: "₹17,999", img: "https://iili.io/C1I4v0N.jpg", long: "9 Hours" },
            { id: 8, brand: "Emporio Armani", name: "Stronger With You Absolutely", price: "₹4,599", mrp: "₹6,499", img: "https://iili.io/C1I4ren.png", long: "12 Hours" },
            { id: 9, brand: "Tom Ford", name: "Oud Wood", price: "₹9,999", mrp: "₹14,999", img: "https://iili.io/C1I4PzG.jpg", long: "8 Hours" },
            { id: 10, brand: "Yves Saint Laurent", name: "Y Eau de Parfum", price: "₹4,799", mrp: "₹6,799", img: "https://iili.io/C1I44bs.jpg", long: "10 Hours" },
            { id: 11, brand: "Chanel", name: "Bleu de Chanel Parfum", price: "₹6,999", mrp: "₹9,999", img: "https://iili.io/C1I4ss4.jpg", long: "10 Hours" },
            { id: 12, brand: "Dior", name: "Sauvage Eau de Parfum", price: "₹5,499", mrp: "₹7,999", img: "https://iili.io/C1I4Z12.webp", long: "10+ Hours" },
            { id: 13, brand: "MFK", name: "Baccarat Rouge 540 Extrait", price: "₹13,999", mrp: "₹19,999", img: "https://iili.io/C1I4tgS.jpg", long: "15+ Hours" },
            { id: 14, brand: "Burberry", name: "Hero Eau de Parfum", price: "₹4,299", mrp: "₹5,999", img: "https://iili.io/C1I4bd7.webp", long: "8+ Hours" }
        ];

        const grid = document.getElementById('product-grid');
        products.forEach(p => {
            grid.innerHTML += `
                <div class="product-card glass p-8 rounded-[35px]" onclick="openModal(${p.id})">
                    <div class="img-box mb-8 shadow-inner">
                        <img src="${p.img}" alt="${p.name}" loading="lazy">
                    </div>
                    <p class="text-[10px] uppercase tracking-[0.4em] text-blue-500 font-bold mb-2">${p.brand}</p>
                    <h3 class="text-md font-medium text-white mb-4">${p.name}</h3>
                    <div class="flex items-baseline gap-2 mb-4">
                        <span class="price-old">${p.mrp}</span>
                        <span class="price-new text-sm">${p.price}</span>
                    </div>
                    <div class="flex justify-end items-center">
                        <span class="text-[9px] border border-white/20 px-4 py-2 rounded-full uppercase tracking-tighter hover:bg-white hover:text-black transition">View Boutique</span>
                    </div>
                </div>
            `;
        });

        const init3D = () => {
            const canvas = document.getElementById('bg-canvas');
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 7;

            const group = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(1, 1, 3.2, 64),
                new THREE.MeshPhysicalMaterial({ color: 0x000814, transmission: 0.98, thickness: 1.5, roughness: 0.05, ior: 1.5 })
            );
            const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.8, 64), new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 1, roughness: 0.1 }));
            cap.position.y = 2;
            group.add(body, cap);
            scene.add(group);

            const light = new THREE.PointLight(0x3b82f6, 3, 50); light.position.set(5, 5, 5); scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            let mX = 0, mY = 0;
            window.addEventListener('mousemove', e => {
                mX = (e.clientX / window.innerWidth) - 0.5;
                mY = (e.clientY / window.innerHeight) - 0.5;
            });

            gsap.registerPlugin(ScrollTrigger);
            gsap.timeline({ scrollTrigger: { trigger: "body", start: "top top", end: "bottom bottom", scrub: 1 } })
                .to(group.position, { x: -3.5, duration: 1 })
                .to(group.rotation, { y: Math.PI * 2, duration: 1 }, 0);

            function animate() {
                requestAnimationFrame(animate);
                group.rotation.y += (mX * 0.4 - group.rotation.y) * 0.05;
                group.rotation.x += (mY * 0.2 - group.rotation.x) * 0.05;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };

        window.addEventListener('load', () => {
            init3D();
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 1000);

                gsap.to("#hero-title", { opacity: 1, y: -20, duration: 1.5, ease: "power4.out" });
                gsap.to("#hero-sub", { opacity: 1, duration: 1.5, delay: 0.5 });
                gsap.to("#hero-btns", { opacity: 1, duration: 1.5, delay: 0.8 });
            }, 1800);
        });

        function openModal(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('m-img').src = p.img;
            document.getElementById('m-brand').innerText = p.brand;
            document.getElementById('m-name').innerText = p.name;
            document.getElementById('m-long').innerText = p.long;
            document.getElementById('m-mrp').innerText = p.mrp;
            document.getElementById('m-price').innerText = p.price;
            document.getElementById('m-wa').href = `https://wa.me/91XXXXXXXXXX?text=I'm interested in ${p.brand} ${p.name}`;
            document.getElementById('modal').classList.add('active');
            document.getElementById('modal').scrollTop = 0;
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        window.onkeydown = e => { if(e.key === "Escape") closeModal(); };
    </script>
</body>
</html>
